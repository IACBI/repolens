name: Documentation issue
description: Report missing, confusing, or stale documentation.
title: "[Docs]: "
labels:
  - documentation
body:
  - type: textarea
    id: location
    attributes:
      label: Documentation location
      description: Which page or section needs work?
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: Issue
      description: What is inaccurate, missing, or unclear?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested fix
