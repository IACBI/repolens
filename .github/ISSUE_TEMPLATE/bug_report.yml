name: Bug report
description: Report a reproducible problem in RepoLens.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the commands and repository shape needed to reproduce the issue.
      placeholder: |
        1. Run `pnpm dev -- summary`
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "20.x"
  - type: input
    id: pnpm
    attributes:
      label: pnpm version
  - type: input
    id: os
    attributes:
      label: Operating system
